kind = "web"
previewPath = "/"
title = "Resonate"
version = "1.0.0"
id = "artifacts/resonate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22512

[services.development]
run = "pnpm --filter @workspace/resonate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resonate", "run", "build" ]
publicDir = "artifacts/resonate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22512"
BASE_PATH = "/"
